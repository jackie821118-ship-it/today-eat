<!DOCTYPE html>

<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>今天吃什麼</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@500;700;900&family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      linear-gradient(rgba(165,200,255,0.10) 1px, transparent 1px),
      linear-gradient(90deg, rgba(165,200,255,0.10) 1px, transparent 1px),
      #FFF7F0;
    background-size:26px 26px, 26px 26px;
    color:#4A3F46;
    font-family:Noto Sans TC, sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    padding:10px 12px 16px;
  }
  .app{width:100%;max-width:480px;}

/* Loading */
.loading{
text-align:center;padding:60px 20px;
font-family:Zen Maru Gothic,sans-serif;font-weight:700;font-size:16px;color:#9B8E94;
}
.loading-dot{display:inline-block;animation:blink 1.2s infinite;}
.loading-dot:nth-child(2){animation-delay:.2s;}
.loading-dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.2;}40%{opacity:1;}}

header{text-align:center;margin-bottom:8px;}
h1{font-family:Zen Maru Gothic,sans-serif;font-weight:900;font-size:28px;margin:0;color:#4A3F46;}
.subtitle{
margin-top:5px;display:inline-block;
font-family:Zen Maru Gothic,sans-serif;font-weight:700;font-size:11px;
color:#4A3F46;background:#FFD166;padding:3px 10px;border-radius:999px;
box-shadow:0 2px 0 rgba(74,63,70,0.12);
}

.loc-tabs{display:flex;gap:6px;justify-content:center;margin-bottom:7px;}
.loc-tab{
font-family:Zen Maru Gothic,sans-serif;font-weight:700;font-size:15px;
padding:6px 18px;border-radius:999px;border:2px solid rgba(74,63,70,0.15);
background:#fff;color:#4A3F46;cursor:pointer;
box-shadow:0 2px 0 rgba(74,63,70,0.1);transition:all .15s;
}
.loc-tab.active{background:#A5C8FF;border-color:#A5C8FF;color:#fff;box-shadow:0 2px 0 #6A9FD4;transform:translateY(1px);}

.tabs{display:flex;flex-wrap:wrap;gap:5px;justify-content:center;margin-bottom:10px;}
.tab{
font-family:Zen Maru Gothic,sans-serif;font-weight:700;font-size:15px;
padding:6px 14px;border-radius:999px;border:2px solid rgba(74,63,70,0.12);
background:#fff;color:#4A3F46;cursor:pointer;
box-shadow:0 2px 0 rgba(74,63,70,0.1);transition:all .15s;user-select:none;
}
.tab.active{background:#E2486A;border-color:#E2486A;color:#fff;box-shadow:0 2px 0 #A4203F;transform:translateY(1px);}

.wheel-zone{position:relative;display:flex;flex-direction:column;align-items:center;margin-bottom:6px;}
.pointer{
width:0;height:0;
border-left:9px solid transparent;border-right:9px solid transparent;
border-top:14px solid #E2486A;
filter:drop-shadow(0 2px 3px rgba(74,63,70,.25));
margin-bottom:-2px;z-index:3;
}
.wheel-outer{
position:relative;
width:min(230px,58vw);height:min(230px,58vw);
border-radius:50%;background:#fff;padding:7px;
box-shadow:0 0 0 4px #fff,0 0 0 7px #FFD166,0 8px 20px rgba(74,63,70,.18);
}
.wheel-hub{display:none;}
#wheelCanvas{width:100%;height:100%;border-radius:50%;display:block;transition:transform 3.4s cubic-bezier(.15,.65,.1,1);}
.empty-wheel{
position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
text-align:center;color:#9B8E94;font-size:12px;padding:0 24px;
}

.spin-btn{
position:absolute;top:50%;left:50%;
transform:translate(-50%,-50%);
width:54px;height:54px;border-radius:50%;
border:none;background:#E2486A;
color:#fff;font-family:Zen Maru Gothic,sans-serif;font-weight:900;font-size:14px;
cursor:pointer;z-index:4;
display:flex;align-items:center;justify-content:center;
box-shadow:0 4px 0 #A4203F;
transition:transform .1s,box-shadow .1s;
letter-spacing:1px;padding:0;
}
.spin-btn:active{transform:translate(-50%,-50%) translateY(3px);box-shadow:0 1px 0 #A4203F;}
.spin-btn:disabled{background:#FFF3EC;color:#9B8E94;border:none;box-shadow:0 4px 0 rgba(74,63,70,0.1);cursor:not-allowed;}

.result{
margin-top:10px;border-radius:14px;background:#fff;
border:3px dashed #8AD1B8;box-shadow:0 4px 0 rgba(138,209,184,0.3);display:none;overflow:hidden;
}
.result.show{display:block;animation:pop .8s ease-out;}
@keyframes pop{0%{transform:scale(.88);opacity:0;}60%{transform:scale(1.03);}100%{transform:scale(1);opacity:1;}}
.result-header{background:#DFF3EA;padding:8px 12px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.result-label{font-family:Zen Maru Gothic,sans-serif;font-weight:700;font-size:11px;letter-spacing:2px;color:#4FA988;}
.result-name{font-family:Zen Maru Gothic,sans-serif;font-weight:900;font-size:18px;color:#4A3F46;}
.result-body{padding:8px 12px;display:flex;flex-direction:column;gap:4px;}
.result-row{display:flex;align-items:flex-start;gap:6px;font-size:15px;color:#4A3F46;}
.result-row .icon{flex-shrink:0;width:16px;text-align:center;}
.result-links{display:flex;gap:6px;margin-top:4px;}
.result-links a{
flex:1;text-align:center;padding:7px;border-radius:8px;font-size:12px;
font-family:Zen Maru Gothic,sans-serif;font-weight:700;text-decoration:none;
}
.btn-web{background:#C9B6F2;color:#4A3F46;}

.error{text-align:center;padding:20px;color:#E2486A;font-size:13px;}
</style>

</head>
<body>
<div class="app">
  <header>
    <h1>🍜 今天吃什麼 🍙</h1>

  </header>

  <div id="mainContent">
    <div class="loading">
      載入中<span class="loading-dot">.</span><span class="loading-dot">.</span><span class="loading-dot">.</span>
    </div>
  </div>
</div>

<script>
(function(){

// Google Sheets 試算表 ID
const SHEET_ID = '1oz8eGyyPrPJ_l4Wzal4BQh-gTopz_uIRz_MoDwnnyaA';

// 分頁名稱對應地點名稱
const SHEET_TABS = [
  { gid: '0',        loc: '新莊' },
  { gid: '87995849',  loc: '新埔' }
];

const FILLS   = ['#FFE0E6','#FFF3D6','#DFF3EA','#E4EEFF','#EFE6FB'];
const BORDERS = ['#FF8FA3','#FFD166','#8AD1B8','#A5C8FF','#C9B6F2'];

let DATA = {};      // { '新莊': [...], '新埔': [...] }
let activeLoc  = '全區';
let activeType = '全部';
let rotation   = 0;
let spinning   = false;

// ── 1. 抓資料 ──────────────────────────────────
async function fetchSheet(gid, loc){
  const url = 'https://docs.google.com/spreadsheets/d/' + SHEET_ID +
              '/gviz/tq?tqx=out:json&gid=' + gid;
  const res  = await fetch(url);
  const text = await res.text();
  const json = JSON.parse(text.replace(/^[^{]+/, '').replace(/\);?\s*$/, ''));
  const rows = json.table.rows;
  return rows.map(r => {
    const c = r.c;
    return {
      loc:     loc,
      type:    (c[0] && c[0].v) ? String(c[0].v).trim() : '',
      name:    (c[1] && c[1].v) ? String(c[1].v).trim() : '',
      map:     (c[2] && c[2].v) ? String(c[2].v).trim() : '',
      phone:   (c[3] && c[3].v) ? String(c[3].v).trim() : '',
      hours:   (c[4] && c[4].v) ? String(c[4].v).trim() : '',
      website: (c[5] && c[5].v) ? String(c[5].v).trim() : ''
    };
  }).filter(r => r.name && r.name !== '供應商');
}

async function loadAll(){
  try {
    let allRows = [];
    for(const tab of SHEET_TABS){
      const rows = await fetchSheet(tab.gid, tab.loc);
      allRows = allRows.concat(rows);
    }
    // 用 loc 欄位分開存，確保不會混
    DATA['新莊'] = allRows.filter(r => r.loc === '新莊');
    DATA['新埔'] = allRows.filter(r => r.loc === '新埔');
    buildUI();
  } catch(e) {
    document.getElementById('mainContent').innerHTML =
      '<div class="error">⚠️ 資料載入失敗，請確認試算表已公開分享<br><small>' + e.message + '</small></div>';
  }
}

// ── 2. 建立 UI ─────────────────────────────────
function buildUI(){
  document.getElementById('mainContent').innerHTML = `
    <div class="loc-tabs" id="locTabs"></div>
    <div class="tabs" id="tabs"></div>
    <div class="wheel-zone">
      <div class="pointer"></div>
      <div class="wheel-outer">
        <canvas id="wheelCanvas" width="600" height="600"></canvas>
        <button class="spin-btn" id="spinBtn">轉一下</button>
        <div class="empty-wheel" id="emptyWheel" style="display:none;">這個條件沒有餐廳</div>
      </div>
    </div>

    <div class="result" id="result">
      <div class="result-header">
        <span class="result-label">今天就吃</span>
        <span class="result-name" id="resultName"></span>
      </div>
      <div class="result-body" id="resultBody"></div>
    </div>`;

  document.getElementById('spinBtn').onclick = spin;
  renderAll();
}

// ── 3. 資料過濾 ────────────────────────────────
function getPool(){
  let pool = activeLoc === '全區'
    ? [...(DATA['新莊']||[]), ...(DATA['新埔']||[])]
    : (DATA[activeLoc] || []);
  if(activeType !== '全部') pool = pool.filter(r => r.type === activeType);
  return pool;
}

function getTypes(){
  let pool = activeLoc === '全區'
    ? [...(DATA['新莊']||[]), ...(DATA['新埔']||[])]
    : (DATA[activeLoc] || []);
  return ['全部', ...[...new Set(pool.map(r => r.type).filter(Boolean))].sort()];
}

// ── 4. 渲染 ────────────────────────────────────
function renderLocTabs(){
  const el = document.getElementById('locTabs');
  if(!el) return;
  el.innerHTML = '';
  ['全區','新莊','新埔'].forEach(loc => {
    const btn = document.createElement('div');
    btn.className = 'loc-tab' + (activeLoc === loc ? ' active' : '');
    btn.textContent = loc;
    btn.onclick = () => { if(spinning) return; activeLoc = loc; activeType = '全部'; reset(); renderAll(); };
    el.appendChild(btn);
  });
}

function renderTypeTabs(){
  const el = document.getElementById('tabs');
  if(!el) return;
  el.innerHTML = '';
  const allPool = activeLoc === '全區'
    ? [...(DATA['新莊']||[]), ...(DATA['新埔']||[])]
    : (DATA[activeLoc] || []);
  getTypes().forEach(t => {
    const btn = document.createElement('div');
    btn.className = 'tab' + (activeType === t ? ' active' : '');
    btn.textContent = t;
    btn.onclick = () => { if(spinning) return; activeType = t; reset(); renderAll(); };
    el.appendChild(btn);
  });
}

function reset(){
  const r = document.getElementById('result');
  const c = document.getElementById('wheelCanvas');
  if(r) r.classList.remove('show');
  rotation = 0;
  if(c){ c.style.transition='none'; c.style.transform='rotate(0deg)';
    requestAnimationFrame(() => { c.style.transition='transform 3.4s cubic-bezier(.15,.65,.1,1)'; }); }
}

function drawWheel(){
  const canvas = document.getElementById('wheelCanvas');
  const emptyEl = document.getElementById('emptyWheel');
  const spinBtn = document.getElementById('spinBtn');
  if(!canvas) return;
  const ctx = canvas.getContext('2d');
  const pool = getPool();
  const w = canvas.width, cx = w/2, r = w/2-6;
  ctx.clearRect(0,0,w,w);
  if(pool.length === 0){
    if(emptyEl) emptyEl.style.display='flex';
    if(spinBtn) spinBtn.disabled=true;
    return;
  }
  if(emptyEl) emptyEl.style.display='none';
  if(spinBtn) spinBtn.disabled=false;
  const seg = (Math.PI*2)/pool.length;
  pool.forEach((item, i) => {
    const s=i*seg, e=s+seg;
    ctx.beginPath(); ctx.moveTo(cx,cx); ctx.arc(cx,cx,r,s,e); ctx.closePath();
    ctx.fillStyle=FILLS[i%FILLS.length]; ctx.fill();
    ctx.strokeStyle=BORDERS[i%BORDERS.length]; ctx.lineWidth=4; ctx.stroke();
    ctx.save(); ctx.translate(cx,cx); ctx.rotate(s+seg/2);
    ctx.textAlign='right'; ctx.textBaseline='middle';
    let fs=30, mc=10;
    if(pool.length>4){fs=26;mc=8;}
    if(pool.length>8){fs=22;mc=6;}
    if(pool.length>12){fs=18;mc=5;}
    if(pool.length>20){fs=14;mc=4;}
    ctx.font='900 '+fs+'px Noto Sans TC,sans-serif';
    let label=item.name; if(label.length>mc) label=label.slice(0,mc-1)+'…';
    ctx.lineWidth=5; ctx.strokeStyle='rgba(255,255,255,0.9)'; ctx.lineJoin='round';
    ctx.strokeText(label,r-18,0); ctx.fillStyle='#4A3F46'; ctx.fillText(label,r-18,0);
    ctx.restore();
  });
}

function spin(){
  const pool = getPool();
  const canvas = document.getElementById('wheelCanvas');
  const spinBtn = document.getElementById('spinBtn');
  const resultEl = document.getElementById('result');
  if(!pool.length || spinning || !canvas) return;
  spinning=true; spinBtn.disabled=true;
  if(resultEl) resultEl.classList.remove('show');
  const segDeg=360/pool.length;
  const wi=Math.floor(Math.random()*pool.length);
  const jitter=(Math.random()-.5)*segDeg*.6;
  let target=(270-(wi*segDeg+segDeg/2+jitter))%360;
  if(target<0) target+=360;
  const spins=5+Math.floor(Math.random()*3);
  const cur=((rotation%360)+360)%360;
  let delta=target-cur; if(delta<=0) delta+=360;
  rotation=rotation+delta+360*spins;
  canvas.style.transform='rotate('+rotation+'deg)';
  setTimeout(()=>{
    spinning=false; spinBtn.disabled=false;
    const winner=pool[wi];
    const nameEl=document.getElementById('resultName');
    const bodyEl=document.getElementById('resultBody');
    if(nameEl){
      let nameHtml = winner.name;
      if(winner.map)
        nameHtml += ' <a href="'+winner.map+'" target="_blank" style="display:inline-block;font-size:11px;background:#FFD166;color:#4A3F46;padding:2px 8px;border-radius:999px;text-decoration:none;font-family:Zen Maru Gothic,sans-serif;font-weight:700;vertical-align:middle;">📍 地圖</a>';
      if(winner.website)
        nameHtml += ' <a href="'+winner.website+'" target="_blank" style="display:inline-block;font-size:11px;background:#C9B6F2;color:#4A3F46;padding:2px 8px;border-radius:999px;text-decoration:none;font-family:Zen Maru Gothic,sans-serif;font-weight:700;vertical-align:middle;">🔗 官網</a>';
      nameEl.innerHTML = nameHtml;
    }
    if(bodyEl){
      let html='';
      if(winner.hours||winner.phone) html+='<div class="result-row"><span class="icon">🕐</span><span>'+(winner.hours||'')+(winner.hours&&winner.phone?' ':'')+(winner.phone?'📞 <a href="tel:'+winner.phone+'" style="color:#4A3F46;text-decoration:underline;">'+winner.phone+'</a>':'')+'</span></div>';
      bodyEl.innerHTML=html;
    }
    if(resultEl) resultEl.classList.add('show');
  },3500);
}

function renderAll(){
  renderLocTabs();
  renderTypeTabs();
  drawWheel();
}

// ── 5. 啟動 ────────────────────────────────────
// 先抓新埔分頁的 gid，打開試算表後網址 #gid=xxx 就是該分頁 ID
// 若新埔分頁 gid 不對，請更新 SHEET_TABS 裡的 gid 值
loadAll();

})();
</script>

</body>
</html>
